name: CI

on:
    push:
        branches: [main]
        paths-ignore: &docs-paths
            - '**.md'
            - '.github/ISSUE_TEMPLATE/**'
            - 'LICENSE-*'
            - 'logos/**'
            - 'screenshots/**'
    pull_request:
        branches: [main]
        paths-ignore: *docs-paths
    workflow_dispatch:

permissions:
    contents: read
    packages: write

jobs:
    check:
        name: Nix Flake Check
        runs-on: ubuntu-latest
        permissions:
            contents: read
            security-events: write # upload clippy findings as code scanning results
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install Nix
              uses: DeterminateSystems/nix-installer-action@v13

            - name: Setup Nix cache
              uses: DeterminateSystems/magic-nix-cache-action@v7

            # Compiles clippy once and emits a SARIF report with repo-relative
            # paths. Built before the gate so the report uploads even when there
            # are findings (the flake check's `clippy` gate then fails the run).
            - name: Build clippy SARIF report
              run: nix build .#clippy-sarif --print-build-logs --out-link clippy-result

            - name: Upload clippy SARIF
              if: always()
              uses: github/codeql-action/upload-sarif@v3
              with:
                  sarif_file: clippy-result/clippy.sarif
                  category: clippy

            - name: Run flake checks
              run: nix flake check --print-build-logs --keep-going

    build-and-push:
        name: Build and Push Docker Image
        needs: check
        runs-on: ubuntu-latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Install Nix
              uses: DeterminateSystems/nix-installer-action@main

            - name: Setup Nix cache
              uses: DeterminateSystems/magic-nix-cache-action@main

            - name: Build Docker image
              run: |
                  nix build .#dockerImage
                  docker load < result

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Push Docker image
              run: |
                  docker tag ghcr.io/activexray/doplarr_rs:latest ghcr.io/activexray/doplarr_rs:main
                  docker push ghcr.io/activexray/doplarr_rs:main
